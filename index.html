<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📁Plan.zip - 제너러티브 주거 평면</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background: linear-gradient(135deg, #141414 0%, #1a1a2e 100%);
            color: #eee;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            z-index: 1;
        }

        header {
            margin-bottom: 50px;
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #f15bb5, #9b5de5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(241, 91, 181, 0.3);
        }

        .subtitle {
            margin: 0;
            color: #aaa;
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .navigation {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 60px;
            flex-wrap: wrap;
        }

        .nav-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 280px;
            height: 200px;
            background: linear-gradient(135deg, rgba(0, 187, 249, 0.1), rgba(241, 91, 181, 0.1));
            border: 2px solid #00bbf9;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            padding: 20px;
            gap: 15px;
        }

        .nav-button:hover {
            transform: translateY(-8px);
            border-color: #f15bb5;
            box-shadow: 0 12px 40px rgba(241, 91, 181, 0.4);
            background: linear-gradient(135deg, rgba(0, 187, 249, 0.15), rgba(241, 91, 181, 0.15));
        }

        .nav-button.v2 {
            border-color: #9b5de5;
        }

        .nav-button.v2:hover {
            border-color: #f15bb5;
            box-shadow: 0 12px 40px rgba(155, 93, 229, 0.4);
            background: linear-gradient(135deg, rgba(155, 93, 229, 0.15), rgba(241, 91, 181, 0.15));
        }

        .nav-icon {
            font-size: 48px;
        }

        .nav-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .nav-description {
            font-size: 13px;
            color: #999;
            margin: 0;
        }

        .footer {
            position: fixed;
            bottom: 20px;
            font-size: 12px;
            color: #555;
        }

        /* 배경 애니메이션 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 6s infinite;
        }

        .blob:nth-child(1) {
            width: 300px;
            height: 300px;
            background: #f15bb5;
            top: -50px;
            left: -50px;
            animation-delay: 0s;
        }

        .blob:nth-child(2) {
            width: 200px;
            height: 200px;
            background: #00bbf9;
            bottom: 0;
            right: -50px;
            animation-delay: 2s;
        }

        .blob:nth-child(3) {
            width: 250px;
            height: 250px;
            background: #9b5de5;
            top: 50%;
            left: 10%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, 30px) rotate(180deg); }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container">
        <header>
            <h1>📁Plan.zip</h1>
            <p class="subtitle">제너러티브 주거 평면 생성 시스템</p>
        </header>

        <div class="navigation">
            <a href="index713.html" class="nav-button">
                <div class="nav-icon">🏠</div>
                <div class="nav-title">7월 13일</div>
                <p class="nav-description">v1.0</p>
            </a>

            <a href="index716.html" class="nav-button v2">
                <div class="nav-icon">🎨</div>
                <div class="nav-title">7월 16일</div>
                <p class="nav-description">v2.0</p>
            </a>
        </div>
    </div>

    <div class="footer">
        © 2026 Plan.zip | Generative Housing Layout System
    </div>
</body>
</html>
