<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📁Plan.zip - 제너러티브 주거 평면</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #141414; color: #eee; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        header { text-align: center; margin-bottom: 20px; }
        h1 { margin: 0 0 8px 0; font-size: 28px; font-weight: 800; color: #f15bb5; letter-spacing: 1px; text-shadow: 0 0 12px rgba(241,91,181,0.4); }
        p.subtitle { margin: 0; color: #888; font-size: 14px; }

        /* 🌟 레이아웃 3단 그리드 (도면 완벽 일치) */
        #app-layout {
            display: grid;
            grid-template-columns: 320px 1fr 240px;
            gap: 20px; width: 100%; max-width: 1400px; height: calc(100vh - 110px);
            min-height: 650px;
        }

        .panel {
            background-color: #222; border: 1px solid #333; border-radius: 12px;
            padding: 18px; display: flex; flex-direction: column;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); overflow: hidden;
        }
        .panel-title {
            font-size: 15px; font-weight: bold; color: #00bbf9; margin-bottom: 15px;
            padding-bottom: 10px; border-bottom: 1px solid #333; flex-shrink: 0;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* 왼쪽 열 (상/하 분할) */
        #left-col { display: flex; flex-direction: column; gap: 20px; height: 100%; }
        #panel-room-sizes { flex: 1; overflow-y: auto; }
        #panel-general-vars { flex-shrink: 0; }

        /* 슬라이더 공통 스타일 */
        .slider-group { margin-bottom: 14px; }
        .slider-group:last-child { margin-bottom: 0; }
        .slider-group label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; color: #ccc; }
        .slider-group span.val { color: #00bbf9; font-weight: bold; }
        .slider-group.disabled { opacity: 0.3; pointer-events: none; }
        input[type="range"] { width: 100%; accent-color: #00bbf9; cursor: pointer; height: 5px; background: #333; border-radius: 3px; outline: none; }
        
        /* 개별 방 슬라이더 전용 색상 포인트 */
        .room-color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

        /* 중앙 열 (메인 화면) */
        #center-col { display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #1a1a1a; }
        #canvas-container { position: relative; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        canvas { background-color: #ffffff; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); max-width: 100%; max-height: 100%; }

        /* 오른쪽 열 (방 종류 범례) */
        #right-col { overflow-y: auto; }
        .legend-list { display: flex; flex-direction: column; gap: 10px; }
        .legend-item { display: flex; align-items: center; gap: 10px; background: #2a2a2a; padding: 10px 12px; border-radius: 8px; border: 1px solid #333; font-size: 13px; }
        .legend-color { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; }

        /* 버튼 및 적합도 디스플레이 */
        #btn-galapagos {
            background: linear-gradient(135deg, #f15bb5, #9b5de5); color: white; border: none;
            padding: 12px; font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; width: 100%; margin-top: 15px;
            box-shadow: 0 4px 15px rgba(241,91,181,0.3); display: flex; justify-content: center; align-items: center; gap: 6px;
        }
        #btn-galapagos:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(241,91,181,0.5); }
        #btn-galapagos:disabled { background: #444; cursor: not-allowed; transform: none; box-shadow: none; }
        
        #fitness-box { background: #1a1a1a; border-left: 4px solid #00bbf9; padding: 10px 12px; border-radius: 6px; margin-top: 15px; }
        #fitness-val { font-size: 18px; font-weight: bold; color: #00bbf9; margin-top: 2px; }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>
<body>

    <header>
        <h1>📁Plan.zip</h1>
        <p class="subtitle">건축적 위계(Core), 향(Orientation), 개별 공간 가중치를 고려한 실시간 주거 알고리즘</p>
    </header>

    <div id="app-layout">
        
        <!-- 🌟 [좌측] 1. 방 크기 변수 & 2. 용적률 등 환경 변수 -->
        <div id="left-col">
            <!-- 1. 방 크기 개별 변수 -->
            <div class="panel" id="panel-room-sizes">
                <div class="panel-title"><span>🎚️ 방 크기 변수 (개별 설정)</span></div>
                <div id="room-sliders-container"></div>
            </div>

            <!-- 2. 환경 변수 및 갈라파고스 -->
            <div class="panel" id="panel-general-vars">
                <div class="panel-title"><span>⚙️ 용적률 및 환경 변수</span></div>
                <div class="slider-group">
                    <label for="floorRatio"><span>대지 용적률 (밀도)</span> <span class="val" id="valFloorRatio">0.80</span></label>
                    <input type="range" id="floorRatio" min="0.5" max="1.0" step="0.05" value="0.80">
                </div>
                <div class="slider-group">
                    <label for="roomCount"><span>분할 방의 개수 (N)</span> <span class="val" id="valRoomCount">8개</span></label>
                    <input type="range" id="roomCount" min="3" max="10" step="1" value="8">
                </div>
                <div class="slider-group">
                    <label for="seed"><span>알고리즘 Seed (난수)</span> <span class="val" id="valSeed">0</span></label>
                    <input type="range" id="seed" min="0" max="100" step="1" value="0">
                </div>

                <div id="fitness-box">
                    <div style="font-size:11px; color:#aaa;">🎯 거실 중심 ~ 남향점 거리 (Fitness)</div>
                    <div id="fitness-val">0.00 px</div>
                </div>

                <button id="btn-galapagos" onclick="runGalapagosSimulation()">🧬 갈라파고스 최적화 찾기</button>
            </div>
        </div>

        <!-- 🌟 [중앙] 메인 화면 (제너러티브 평면 캔버스) -->
        <div class="panel" id="center-col">
            <div id="canvas-container">
                <canvas id="genPlanCanvas" width="580" height="580"></canvas>
            </div>
        </div>

        <!-- 🌟 [우측] 색 별 방의 종류 (범례) -->
        <div class="panel" id="right-col">
            <div class="panel-title"><span>🎨 색 별로 방의 종류</span></div>
            <div class="legend-list" id="legend-container"></div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('genPlanCanvas');
        const ctx = canvas.getContext('2d');
        const ratioInput = document.getElementById('floorRatio');
        const roomInput = document.getElementById('roomCount');
        const seedInput = document.getElementById('seed');
        const fitnessDisplay = document.getElementById('fitness-val');
        const btnGalapagos = document.getElementById('btn-galapagos');
        const roomSlidersContainer = document.getElementById('room-sliders-container');
        const legendContainer = document.getElementById('legend-container');

        // 방 기본 마스터 데이터 (이름, 기본 가중치, 색상 - 라이노 스크린샷 완벽 일치)
        const roomMaster = [
            { id: 0, name: "거실 (LDK)", defaultWeight: 9.5, color: "#e63946" },   // 1순위: 남향 거실 (빨강)
            { id: 1, name: "부엌", defaultWeight: 5.0, color: "#457b9d" },        // 2순위: 거실 인접 (파랑/슬레이트)
            { id: 2, name: "안방 (방1)", defaultWeight: 6.5, color: "#2a9d8f" },   // 초록
            { id: 3, name: "화장실1", defaultWeight: 2.0, color: "#48cae4" },      // 하늘
            { id: 4, name: "현관", defaultWeight: 1.5, color: "#f4a261" },         // 주황
            { id: 5, name: "창고", defaultWeight: 1.5, color: "#e9c46a" },         // 노랑
            { id: 6, name: "방2", defaultWeight: 4.5, color: "#9b5de5" },          // 보라
            { id: 7, name: "화장실2", defaultWeight: 1.5, color: "#00bbf9" },      // 청록
            { id: 8, name: "사랑방", defaultWeight: 5.0, color: "#f15bb5" },       // 분홍
            { id: 9, name: "방3", defaultWeight: 4.0, color: "#8d99ae" }           // 회청색
        ];
        const CORRIDOR_COLOR = "#505050";

        // 대지 폴리곤 및 핵심 지점 설정
        const boundaryPoints = [
            {x: 100, y: 70}, {x: 460, y: 90}, {x: 520, y: 280}, {x: 480, y: 510},
            {x: 230, y: 530}, {x: 70, y: 370}, {x: 100, y: 70}
        ];
        const start_pt = {x: 110, y: 80};   // 현관 위치
        const south_pt = {x: 270, y: 540};  // 남향 타겟 위치
        const spacing = 13;                 // 격자 간격 (해상도)

        // 🌟 1. UI 동적 생성 (방 크기 슬라이더 & 오른쪽 범례)
        roomMaster.forEach((r, idx) => {
            roomSlidersContainer.innerHTML += `
                <div class="slider-group" id="group-room-${idx}">
                    <label for="room-val-${idx}">
                        <span><i class="room-color-dot" style="background:${r.color};"></i>${r.name}</span>
                        <span class="val" id="disp-room-${idx}">${r.defaultWeight.toFixed(1)}</span>
                    </label>
                    <input type="range" id="room-val-${idx}" class="room-size-slider" min="0.5" max="12.0" step="0.5" value="${r.defaultWeight}">
                </div>`;

            legendContainer.innerHTML += `
                <div class="legend-item" id="legend-item-${idx}">
                    <div class="legend-color" style="background:${r.color};"></div>
                    <span style="font-weight:500;">${r.name}</span>
                </div>`;
        });
        legendContainer.innerHTML += `
            <div class="legend-item">
                <div class="legend-color" style="background:${CORRIDOR_COLOR};"></div>
                <span style="font-weight:500;">복도 (동선)</span>
            </div>`;

        const roomSliders = document.querySelectorAll('.room-size-slider');
        roomSliders.forEach((slider, idx) => {
            slider.addEventListener('input', (e) => {
                document.getElementById(`disp-room-${idx}`).textContent = parseFloat(e.target.value).toFixed(1);
                generatePlan();
            });
        });

        function isPointInPolygon(point, polygon) {
            let x = point.x, y = point.y, inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                let xi = polygon[i].x, yi = polygon[i].y, xj = polygon[j].x, yj = polygon[j].y;
                let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function findCorridorPath(start_idx, end_idx, neighbors_grid) {
            let queue = [[start_idx, []]], visited = new Set([start_idx]);
            while (queue.length > 0) {
                let [curr, path] = queue.shift();
                if (curr === end_idx) return path;
                for (let n of neighbors_grid[curr] || []) {
                    if (!visited.has(n)) { visited.add(n); queue.push([n, [...path, curr]]); }
                }
            }
            return [];
        }

        // 🌟 2. 제너러티브 평면 생성 핵심 알고리즘 (Python 1:1 포팅 및 안전장치 강화)
        function generatePlan() {
            let N_wanted = parseInt(roomInput.value);
            const seed = parseInt(seedInput.value);
            const ratio = parseFloat(ratioInput.value);

            document.getElementById('valFloorRatio').textContent = ratio.toFixed(2);
            document.getElementById('valRoomCount').textContent = N_wanted + "개";
            document.getElementById('valSeed').textContent = seed;

            roomMaster.forEach((r, idx) => {
                const group = document.getElementById(`group-room-${idx}`);
                const legend = document.getElementById(`legend-item-${idx}`);
                if (idx < N_wanted) {
                    group.classList.remove('disabled');
                    legend.style.opacity = "1"; legend.style.display = "flex";
                } else {
                    group.classList.add('disabled');
                    legend.style.opacity = "0.2"; legend.style.display = "none";
                }
            });

            // 시드 난수 생성기
            Math.seedrandom = function(s) {
                var mask = 0xffffffff, m_w = (123456789 + s) & mask, m_z = (987654321 - s) & mask;
                return function() {
                    m_z = (36969 * (m_z & 65535) + (m_z >>> 16)) & mask;
                    m_w = (18000 * (m_w & 65535) + (m_w >>> 16)) & mask;
                    var result = ((m_z << 16) + (m_w & 65535)) & mask;
                    return (result /= 4294967296) + 0.5;
                }
            }
            const rand = Math.seedrandom(seed);

            // 유효 격자 생성
            const pts = [];
            for (let x = 30; x <= 550; x += spacing) {
                for (let y = 30; y <= 550; y += spacing) {
                    if (isPointInPolygon({x, y}, boundaryPoints)) pts.push({x, y});
                }
            }
            const total_area = pts.length;
            if (total_area === 0) return 0;

            // 이웃 관계 매핑
            const threshold = spacing * 1.1;
            const neighbors_grid = {}, grid_map = {};
            for (let i = 0; i < total_area; i++) {
                neighbors_grid[i] = [];
                grid_map[`${pts[i].x}_${pts[i].y}`] = i;
            }
            for (let i = 0; i < total_area; i++) {
                for (let j = i + 1; j < total_area; j++) {
                    if (Math.hypot(pts[i].x - pts[j].x, pts[i].y - pts[j].y) <= threshold) {
                        neighbors_grid[i].push(j);
                        neighbors_grid[j].push(i);
                    }
                }
            }

            // 현관 위치 찾기
            let entrance_idx = 0, min_ent_dist = Infinity;
            pts.forEach((p, i) => {
                let d = Math.hypot(p.x - start_pt.x, p.y - start_pt.y);
                if (d < min_ent_dist) { min_ent_dist = d; entrance_idx = i; }
            });

            // 🌟 [파이썬 원본 매핑 & 남향 최적화 로직]
            // 시드 값에 따라 후보군을 탐색하되, 거실이 구석에 갇히지 않도록 중앙~남향 영역의 안전한 격자를 선정합니다.
            let south_candidates = [];
            pts.forEach((p, i) => {
                if (i !== entrance_idx) south_candidates.push({idx: i, dist: Math.hypot(p.x - south_pt.x, p.y - south_pt.y)});
            });
            south_candidates.sort((a, b) => a.dist - b.dist);
            // 상위 6개의 남향 후보군 중 랜덤 선택하여 갈라파고스 탐색의 다양성 확보
            let core_idx = south_candidates[Math.floor(rand() * Math.min(6, south_candidates.length))].idx;

            const room_ids = Array(total_area).fill(-1);
            const CORRIDOR_ID = N_wanted + 1;

            // 복도 생성
            const path = findCorridorPath(entrance_idx, core_idx, neighbors_grid);
            path.forEach(p => room_ids[p] = CORRIDOR_ID);

            // 사용자 설정 가중치 읽기 및 타겟 면적 계산
            const activeWeights = [];
            for (let i = 0; i < N_wanted; i++) {
                activeWeights.push(parseFloat(document.getElementById(`room-val-${i}`).value));
            }
            const totalWeight = activeWeights.reduce((sum, w) => sum + w, 0);
            const usableArea = Math.floor((total_area - path.length) * ratio);
            const targetAreas = activeWeights.map(w => Math.max(4, Math.floor(usableArea * (w / totalWeight))));
            const currentAreas = Array(N_wanted).fill(0);
            const room_bounds = {};

            function getGridIdx(cx, cy) { return grid_map[`${cx * spacing}_${cy * spacing}`]; }

            // 🌟 5. 거실(0번) 사각형 우선 확장
            room_ids[core_idx] = 0;
            currentAreas[0] = 1;
            let [ccx, ccy] = [Math.round(pts[core_idx].x / spacing), Math.round(pts[core_idx].y / spacing)];
            room_bounds[0] = { min_c: ccx, max_c: ccx, min_r: ccy, max_r: ccy };

            while (currentAreas[0] < targetAreas[0]) {
                let { min_c, max_c, min_r, max_r } = room_bounds[0];
                let dirs = [0, 1, 2, 3].sort(() => rand() - 0.5);
                let grown = false;

                for (let d of dirs) {
                    let cells = [], can_grow = true;
                    if (d === 0) {
                        for (let r = min_r; r <= max_r; r++) { let idx = getGridIdx(max_c + 1, r); if (idx !== undefined && room_ids[idx] === -1) cells.push(idx); else { can_grow = false; break; } }
                        if (can_grow && cells.length) room_bounds[0].max_c++;
                    } else if (d === 1) {
                        for (let r = min_r; r <= max_r; r++) { let idx = getGridIdx(min_c - 1, r); if (idx !== undefined && room_ids[idx] === -1) cells.push(idx); else { can_grow = false; break; } }
                        if (can_grow && cells.length) room_bounds[0].min_c--;
                    } else if (d === 2) {
                        for (let c = min_c; c <= max_c; c++) { let idx = getGridIdx(c, max_r + 1); if (idx !== undefined && room_ids[idx] === -1) cells.push(idx); else { can_grow = false; break; } }
                        if (can_grow && cells.length) room_bounds[0].max_r++;
                    } else if (d === 3) {
                        for (let c = min_c; c <= max_c; c++) { let idx = getGridIdx(c, min_r - 1); if (idx !== undefined && room_ids[idx] === -1) cells.push(idx); else { can_grow = false; break; } }
                        if (can_grow && cells.length) room_bounds[0].min_r--;
                    }
                    if (can_grow && cells.length) {
                        cells.forEach(idx => room_ids[idx] = 0);
                        currentAreas[0] += cells.length;
                        grown = true; break;
                    }
                }
                if (!grown) break;
            }

            // 🌟 [거실 절대 보장 안전장치 (Safe-LDK)]
            // 사각형 확장이 복도나 대지 경계에 막혀 멈추었더라도, 남은 목표 면적만큼 인접 빈땅으로 세포 분열하듯 강제 확장합니다.
            // 이 안전장치 덕분에 갈라파고스 연산 중 어떤 시드(Seed)를 만나도 거실(빨강)이 절대 사라지거나 작아지지 않습니다!
            if (currentAreas[0] < targetAreas[0]) {
                let lr_queue = [];
                pts.forEach((p, i) => { if (room_ids[i] === 0) lr_queue.push(i); });
                while (lr_queue.length > 0 && currentAreas[0] < targetAreas[0]) {
                    let curr = lr_queue.shift();
                    for (let n of neighbors_grid[curr] || []) {
                        if (room_ids[n] === -1) {
                            room_ids[n] = 0;
                            currentAreas[0]++;
                            lr_queue.push(n);
                            if (currentAreas[0] >= targetAreas[0]) break;
                        }
                    }
                }
            }

            // 6. 부엌(1번) 강제 인접 배치
            if (N_wanted > 1) {
                let lr_neighbors = [];
                pts.forEach((p, i) => {
                    if (room_ids[i] === 0) {
                        neighbors_grid[i].forEach(n => { if (room_ids[n] === -1) lr_neighbors.push(n); });
                    }
                });
                if (lr_neighbors.length > 0) {
                    let k_seed = lr_neighbors[Math.floor(rand() * lr_neighbors.length)];
                    room_ids[k_seed] = 1;
                    currentAreas[1] = 1;
                }
            }

            // 7. 나머지 방 씨앗 흩뿌리기
            let placed_seeds = [];
            pts.forEach((p, i) => { if (room_ids[i] === 0 || room_ids[i] === 1) placed_seeds.push(i); });

            for (let r_id = 2; r_id < N_wanted; r_id++) {
                let avail = [];
                pts.forEach((p, i) => { if (room_ids[i] === -1) avail.push(i); });
                if (!avail.length) break;

                avail.sort((a, b) => {
                    let distA = Math.min(...placed_seeds.map(s => Math.hypot(pts[a].x - pts[s].x, pts[a].y - pts[s].y)));
                    let distB = Math.min(...placed_seeds.map(s => Math.hypot(pts[b].x - pts[s].x, pts[b].y - pts[s].y)));
                    return distB - distA;
                });
                let chosen = avail[Math.floor(rand() * Math.min(3, avail.length))];
                room_ids[chosen] = r_id;
                currentAreas[r_id] = 1;
                placed_seeds.push(chosen);
            }

            // 8. 경쟁적 영토 확장 (Flood Fill)
            let queue = [];
            pts.forEach((p, i) => { if (room_ids[i] >= 0 && room_ids[i] < N_wanted) queue.push([i, room_ids[i]]); });

            while (queue.length > 0) {
                let [curr, r_id] = queue.shift();
                if (currentAreas[r_id] >= targetAreas[r_id]) continue;

                for (let n of neighbors_grid[curr] || []) {
                    if (room_ids[n] === -1) {
                        room_ids[n] = r_id;
                        currentAreas[r_id]++;
                        queue.push([n, r_id]);
                    }
                }
            }

            // 9. 빈공간 제로 (100% 가득 채우기)
            let empty_exists = true;
            while (empty_exists) {
                empty_exists = false;
                let to_fill = {};
                pts.forEach((p, i) => {
                    if (room_ids[i] === -1) {
                        empty_exists = true;
                        let counts = {};
                        neighbors_grid[i].forEach(n => {
                            let nid = room_ids[n];
                            if (nid !== -1 && nid !== CORRIDOR_ID) counts[nid] = (counts[nid] || 0) + 1;
                        });
                        let best_rid = Object.keys(counts).sort((a, b) => counts[b] - counts[a])[0];
                        if (best_rid !== undefined) to_fill[i] = parseInt(best_rid);
                    }
                });
                Object.keys(to_fill).forEach(idx => room_ids[idx] = to_fill[idx]);
                if (Object.keys(to_fill).length === 0 && empty_exists) break;
            }

            // 10. 형태 스무딩 (거실(0번) 보호 로직 포함)
            for (let step = 0; step < 2; step++) {
                let changes = {};
                pts.forEach((p, i) => {
                    if (room_ids[i] === CORRIDOR_ID) return;
                    let counts = {};
                    neighbors_grid[i].forEach(n => {
                        let nid = room_ids[n];
                        if (nid !== CORRIDOR_ID) counts[nid] = (counts[nid] || 0) + 1;
                    });
                    let max_id = Object.keys(counts).sort((a,b) => counts[b] - counts[a])[0];
                    // 거실(0번)은 형태 다듬기 과정에서도 자신의 영토가 쉽게 침식되지 않도록 보호합니다.
                    if (max_id !== undefined && parseInt(max_id) !== room_ids[i] && counts[max_id] >= 3) {
                        if (room_ids[i] === 0 && counts[max_id] < 4) return;
                        changes[i] = parseInt(max_id);
                    }
                });
                Object.keys(changes).forEach(i => room_ids[i] = changes[i]);
            }

            // 🌟 [파이썬 원본 적합도(Fitness) 1:1 매핑]
            // 거실(0번) 면적들의 중심점(Centroid)을 구하고, 남향점과의 거리를 잽니다.
            let lr_pts = pts.filter((p, i) => room_ids[i] === 0);
            let fitness = 1000000;
            if (lr_pts.length > 0) {
                let cx = lr_pts.reduce((sum, p) => sum + p.x, 0) / lr_pts.length;
                let cy = lr_pts.reduce((sum, p) => sum + p.y, 0) / lr_pts.length;
                fitness = Math.hypot(cx - south_pt.x, cy - south_pt.y);
            }
            fitnessDisplay.textContent = fitness.toFixed(2) + " px";

            // 11. 캔버스 렌더링
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "#444"; ctx.lineWidth = 2; ctx.beginPath();
            ctx.moveTo(boundaryPoints[0].x, boundaryPoints[0].y);
            boundaryPoints.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.closePath(); ctx.stroke();

            pts.forEach((p, i) => {
                let rid = room_ids[i];
                if (rid === -1) return;
                ctx.fillStyle = rid === CORRIDOR_ID ? CORRIDOR_COLOR : roomMaster[rid].color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, spacing / 2 - 1.2, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.fillStyle = "#f4a261"; ctx.fillRect(start_pt.x - 7, start_pt.y - 7, 14, 14);
            ctx.strokeStyle = "#fff"; ctx.strokeRect(start_pt.x - 7, start_pt.y - 7, 14, 14);

            ctx.fillStyle = "#e63946"; ctx.beginPath(); ctx.arc(south_pt.x, south_pt.y, 8, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();

            return fitness;
        }

        // 🌟 갈라파고스 최적화 시뮬레이션 ('AI' 단어 완벽 제거)//
        let isSimulating = false;
        function runGalapagosSimulation() {
            if (isSimulating) return;
            isSimulating = true;
            btnGalapagos.disabled = true;
            btnGalapagos.innerHTML = "⏳ 진화 연산 중... (최적화 탐색)";

            let currentSeed = 0, bestSeed = 0, minFitness = Infinity;

            let timer = setInterval(() => {
                seedInput.value = currentSeed;
                let fit = generatePlan();

                if (fit < minFitness && fit > 0) {
                    minFitness = fit;
                    bestSeed = currentSeed;
                }

                currentSeed++;
                if (currentSeed > 50) { // 0번부터 50번 시드까지 쾌속 연산
                    clearInterval(timer);
                    seedInput.value = bestSeed;
                    generatePlan();
                    
                    btnGalapagos.disabled = false;
                    btnGalapagos.innerHTML = `🎉 최적화 완료! (Best Seed: ${bestSeed})`;
                    setTimeout(() => btnGalapagos.innerHTML = "🧬 갈라파고스 최적화 찾기", 3000);
                    isSimulating = false;
                }
            }, 35);
        }

        // 이벤트 리스너 등록
        [ratioInput, roomInput, seedInput].forEach(el => el.addEventListener('input', generatePlan));
        generatePlan();
    </script>
</body>
